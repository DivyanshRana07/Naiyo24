version: '3.8'
services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: invoice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_password_2026
      POSTGRES_DB: invoice_business_tools
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - invoice-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_business_tools"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database configuration
      DATABASE_URL: postgresql+psycopg://invoice_user:invoice_password_2026@db:5432/invoice_business_tools
      
      # App configuration
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-my_super_secret_key_2026_invoice_project_change_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
    networks:
      - invoice-network
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 5 &&
        echo 'Creating database tables...' &&
        python -c 'from db import Base, engine; from models import db_models; Base.metadata.create_all(bind=engine); print(\"Tables created successfully\")' &&
        echo 'Starting FastAPI server...' &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  invoice-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
